<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sem IV — Ego Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
:root{
--bg:#0d0d0d;
--bg2:#161616;
--bg3:#1f1f1f;
--border:#2a2a2a;
--border2:#383838;
--text:#f0f0f0;
--text2:#888;
--text3:#555;
--accent:#c8ff00;
--red:#ff4444;
--orange:#ff9500;
--green:#44cc44;
--red-bg:rgba(255,68,68,0.12);
--orange-bg:rgba(255,149,0,0.12);
--green-bg:rgba(68,204,68,0.12);
--font-mono:'Space Mono',monospace;
--font-body:'DM Sans',sans-serif;
--radius:10px;
--radius-sm:6px;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html{
background:var(--bg);
color:var(--text);
font-family:var(--font-body);
}

body{
min-height:100vh;
padding-bottom:2rem;
}

/* Loading Screen */

#loading-screen{
position:fixed;
inset:0;
z-index:9999;
background:var(--bg);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
transition:opacity 0.5s ease, visibility 0.5s;
}

#loading-screen img{
width:120px;
height:120px;
object-fit:contain;
margin-bottom:24px;
animation:pulse 2s infinite ease-in-out;
}

#loading-screen .loading-text{
font-family:var(--font-mono);
font-size:14px;
color:var(--accent);
letter-spacing:0.15em;
text-transform:uppercase;
font-weight:700;
text-align:center;
}

@keyframes pulse{
0%{transform:scale(0.95);opacity:0.7;}
50%{transform:scale(1.05);opacity:1;}
100%{transform:scale(0.95);opacity:0.7;}
}

/* Topbar */

.topbar{
position:sticky;
top:0;
z-index:100;
background:rgba(13,13,13,0.92);
backdrop-filter:blur(12px);
border-bottom:1px solid var(--border);
padding:8px 16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo-wrap{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:32px;
height:32px;
object-fit:contain;
border-radius:4px;
}

.topbar-title{
font-family:var(--font-mono);
font-size:13px;
color:var(--accent);
letter-spacing:0.05em;
text-transform:uppercase;
}

.topbar-score{
font-family:var(--font-mono);
font-size:13px;
color:var(--text2);
}

.topbar-score span{
color:var(--accent);
font-weight:700;
}

.metrics{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:1px;
background:var(--border);
margin-bottom:16px;
}

.mc{
background:var(--bg2);
padding:14px 12px;
text-align:center;
}

.mv{
font-family:var(--font-mono);
font-size:22px;
font-weight:700;
}

.ml{
font-size:11px;
color:var(--text3);
margin-top:4px;
text-transform:uppercase;
letter-spacing:0.06em;
}

.container{
max-width:680px;
margin:0 auto;
padding:16px;
}

.section-label{
font-family:var(--font-mono);
font-size:10px;
color:var(--text3);
letter-spacing:0.1em;
text-transform:uppercase;
margin-bottom:8px;
}

.ctabs{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-bottom:20px;
}

.ctab{
padding:6px 14px;
border-radius:20px;
border:1px solid var(--border2);
font-size:12px;
font-family:var(--font-mono);
cursor:pointer;
background:var(--bg2);
color:var(--text2);
transition:all 0.15s;
letter-spacing:0.03em;
}

.ctab:hover{
border-color:var(--accent);
color:var(--text);
}

.ctab.active{
background:var(--accent);
color:#0d0d0d;
border-color:var(--accent);
font-weight:700;
}

.utabs{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-bottom:16px;
}

.utab{
padding:5px 12px;
border-radius:var(--radius-sm);
border:1px solid var(--border);
font-size:12px;
font-family:var(--font-mono);
cursor:pointer;
background:var(--bg2);
color:var(--text3);
transition:all 0.15s;
position:relative;
}

.utab:hover{
border-color:var(--border2);
color:var(--text2);
}

.utab.active{
border-color:var(--accent);
color:var(--accent);
}

.utab .pip{
width:6px;
height:6px;
border-radius:50%;
position:absolute;
top:3px;
right:3px;
}

.panel{
background:var(--bg2);
border:1px solid var(--border);
border-radius:var(--radius);
padding:16px;
margin-bottom:14px;
}

.panel-hdr{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:6px;
gap:8px;
}

.panel-title{
font-size:14px;
font-weight:600;
color:var(--text);
line-height:1.4;
flex:1;
}

.uscore{
font-family:var(--font-mono);
font-size:20px;
font-weight:700;
white-space:nowrap;
}

.pbar{
height:4px;
border-radius:2px;
background:var(--border);
margin-bottom:14px;
overflow:hidden;
}

.pfill{
height:100%;
border-radius:2px;
transition:width 0.4s cubic-bezier(0.4,0,0.2,1);
}

.stlist{
display:flex;
flex-direction:column;
gap:4px;
max-height:400px;
overflow-y:auto;
padding-right:2px;
}

.strow{
display:flex;
align-items:center;
gap:8px;
padding:7px 10px;
border-radius:var(--radius-sm);
border:1px solid var(--border);
}

.stname{
flex:1;
font-size:13px;
color:var(--text2);
}

.stbtn{
font-size:10px;
padding:3px 9px;
border-radius:10px;
border:1px solid transparent;
cursor:pointer;
white-space:nowrap;
font-family:var(--font-mono);
font-weight:700;
}

.sn{
background:var(--red-bg);
color:var(--red);
}

.sp{
background:var(--orange-bg);
color:var(--orange);
}

.sd{
background:var(--green-bg);
color:var(--green);
}

.addrow{
display:flex;
gap:8px;
margin-top:10px;
}

.addrow input{
flex:1;
padding:7px 11px;
border:1px solid var(--border2);
border-radius:var(--radius-sm);
font-size:13px;
background:var(--bg3);
color:var(--text);
outline:none;
}

.addrow button{
padding:7px 13px;
border-radius:var(--radius-sm);
border:1px solid var(--border2);
font-size:12px;
cursor:pointer;
background:var(--bg3);
color:var(--text2);
font-family:var(--font-mono);
}

.chart-wrap{
background:var(--bg2);
border:1px solid var(--border);
border-radius:var(--radius);
padding:16px;
margin-bottom:14px;
}

.roast{
border-radius:var(--radius);
padding:12px 16px;
font-size:13px;
line-height:1.65;
font-weight:500;
border:1px solid;
font-family:var(--font-mono);
}
</style>
</head>

<body>

<div id="loading-screen">
<img src="logo.png" alt="Ego Tracker Logo">
<div class="loading-text">FEED YOUR WILL TO WIN</div>
</div>

<div class="topbar">
<div class="logo-wrap">
<img src="logo.png" alt="Ego Tracker Logo" class="logo">
<span class="topbar-title">EGO TRACKER</span>
</div>

<span class="topbar-score">
OVERALL: <span id="overall-pct">0%</span>
</span>
</div>

<div class="metrics" id="metrics"></div>

<div class="container">

<div class="section-label">Course</div>
<div class="ctabs" id="ctabs"></div>

<div class="section-label">Unit</div>
<div class="utabs" id="utabs"></div>

<div class="panel">

<div class="panel-hdr">
<span class="panel-title" id="ptitle">Unit</span>
<span class="uscore" id="uscore">0%</span>
</div>

<div class="pbar">
<div class="pfill" id="pfill"></div>
</div>

<div class="stlist" id="stlist"></div>

<div class="addrow">
<input id="newst" placeholder="Add subtopic..." maxlength="70"/>
<button onclick="addST()">+ ADD</button>
</div>

</div>

<div class="chart-wrap">
<canvas id="ch"></canvas>
</div>

<div class="roast" id="roast"></div>

</div>

<script>

ls.style.visibility='hidden';
}
},2000);

</script>

</body>
</html>
