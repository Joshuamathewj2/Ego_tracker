<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sem V — Ego Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0d0d0d;--bg2:#161616;--bg3:#1f1f1f;--border:#2a2a2a;--border2:#383838;--text:#f0f0f0;--text2:#888;--text3:#555;--accent:#c8ff00;--red:#ff4444;--orange:#ff9500;--green:#44cc44;--red-bg:rgba(255,68,68,0.12);--orange-bg:rgba(255,149,0,0.12);--green-bg:rgba(68,204,68,0.12);--font-mono:'Space Mono',monospace;--font-body:'DM Sans',sans-serif;--radius:10px;--radius-sm:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);color:var(--text);font-family:var(--font-body);}
body{min-height:100vh;padding-bottom:2rem;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(13,13,13,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo{width:32px;height:32px;object-fit:contain;border-radius:4px;}
.topbar-title{font-family:var(--font-mono);font-size:13px;color:var(--accent);letter-spacing:0.05em;text-transform:uppercase;}
.topbar-score{font-family:var(--font-mono);font-size:13px;color:var(--text2);}
.topbar-score span{color:var(--accent);font-weight:700;}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-bottom:16px;}
.mc{background:var(--bg2);padding:14px 12px;text-align:center;}
.mv{font-family:var(--font-mono);font-size:22px;font-weight:700;}
.ml{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em;}
.container{max-width:680px;margin:0 auto;padding:16px;}
.section-label{font-family:var(--font-mono);font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.ctabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.ctab{padding:6px 14px;border-radius:20px;border:1px solid var(--border2);font-size:12px;font-family:var(--font-mono);cursor:pointer;background:var(--bg2);color:var(--text2);transition:all 0.15s;letter-spacing:0.03em;}
.ctab:hover{border-color:var(--accent);color:var(--text);}
.ctab.active{background:var(--accent);color:#0d0d0d;border-color:var(--accent);font-weight:700;}
.utabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.utab{padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px;font-family:var(--font-mono);cursor:pointer;background:var(--bg2);color:var(--text3);transition:all 0.15s;position:relative;}
.utab:hover{border-color:var(--border2);color:var(--text2);}
.utab.active{border-color:var(--accent);color:var(--accent);}
.utab .pip{width:6px;height:6px;border-radius:50%;position:absolute;top:3px;right:3px;}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.panel-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px;}
.panel-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;flex:1;}
.uscore{font-family:var(--font-mono);font-size:20px;font-weight:700;white-space:nowrap;}
.pbar{height:4px;border-radius:2px;background:var(--border);margin-bottom:14px;overflow:hidden;}
.pfill{height:100%;border-radius:2px;transition:width 0.4s cubic-bezier(0.4,0,0.2,1);}
.stlist{display:flex;flex-direction:column;gap:4px;max-height:400px;overflow-y:auto;padding-right:2px;}
.stlist::-webkit-scrollbar{width:3px;}
.stlist::-webkit-scrollbar-track{background:transparent;}
.stlist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.strow{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);transition:border-color 0.1s;}
.strow:hover{border-color:var(--border2);}
.strow.done-row{border-color:rgba(68,204,68,0.2);background:rgba(68,204,68,0.04);}
.strow.prog-row{border-color:rgba(255,149,0,0.2);background:rgba(255,149,0,0.04);}
.stnum{font-family:var(--font-mono);font-size:10px;color:var(--text3);min-width:18px;}
.stname{flex:1;font-size:13px;color:var(--text2);}
.strow.done-row .stname{color:var(--text);}
.stbtn{font-size:10px;padding:3px 9px;border-radius:10px;border:1px solid transparent;cursor:pointer;white-space:nowrap;font-family:var(--font-mono);font-weight:700;letter-spacing:0.03em;transition:all 0.1s;}
.sn{background:var(--red-bg);color:var(--red);border-color:rgba(255,68,68,0.25);}
.sp{background:var(--orange-bg);color:var(--orange);border-color:rgba(255,149,0,0.25);}
.sd{background:var(--green-bg);color:var(--green);border-color:rgba(68,204,68,0.25);}
.addrow{display:flex;gap:8px;margin-top:10px;}
.addrow input{flex:1;padding:7px 11px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;background:var(--bg3);color:var(--text);outline:none;font-family:var(--font-body);transition:border-color 0.15s;}
.addrow input:focus{border-color:var(--accent);}
.addrow input::placeholder{color:var(--text3);}
.addrow button{padding:7px 13px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-size:12px;cursor:pointer;background:var(--bg3);color:var(--text2);font-family:var(--font-mono);transition:all 0.15s;}
.addrow button:hover{border-color:var(--accent);color:var(--accent);}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.clbl{font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);font-family:var(--font-mono);}
.ld{width:8px;height:8px;border-radius:2px;}
.roast{border-radius:var(--radius);padding:12px 16px;font-size:13px;line-height:1.65;font-weight:500;border:1px solid;font-family:var(--font-mono);letter-spacing:0.01em;}
.cinfo{font-size:12px;color:var(--text3);margin-bottom:14px;padding:0 2px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo-wrap">
    <img src="logo.png" alt="Ego Tracker Logo" class="logo">
    <span class="topbar-title">EGO TRACKER</span>
  </div>
  <span class="topbar-score">OVERALL: <span id="overall-pct">0%</span></span>
</div>
<div class="metrics" id="metrics"></div>
<div class="container">
  <div class="section-label">Course</div>
  <div class="ctabs" id="ctabs"></div>
  <div class="cinfo" id="cinfo"></div>
  <div class="section-label">Unit</div>
  <div class="utabs" id="utabs"></div>
  <div class="panel">
    <div class="panel-hdr">
      <span class="panel-title" id="ptitle">Unit</span>
      <span class="uscore" id="uscore">0%</span>
    </div>
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
    <div class="stlist" id="stlist"></div>
    <div class="addrow">
      <input id="newst" placeholder="Add subtopic..." maxlength="70"/>
      <button onclick="addST()">+ ADD</button>
    </div>
  </div>
  <div class="chart-wrap">
    <div class="clbl" id="clbl">UNIT BREAKDOWN</div>
    <div style="position:relative;height:160px;"><canvas id="ch"></canvas></div>
    <div class="legend">
      <div class="li"><div class="ld" style="background:#44cc44"></div>DONE</div>
      <div class="li"><div class="ld" style="background:#ff9500"></div>IN PROGRESS</div>
      <div class="li"><div class="ld" style="background:#ff4444"></div>NOT STARTED</div>
    </div>
  </div>
  <div class="roast" id="roast"></div>
</div>
<script>
const DATA={
  TOC:{label:'Theory of Computation',units:[
    {name:'Regular Languages',topics:['Introduction to Formal Languages','Introduction to Automata','Finite Automata - DFA','Finite Automata - NFA','Epsilon Transitions','Regular Expressions','FA and Regular Expressions','Proving Languages Not Regular','Closure Properties of Regular Languages','Decision Properties of Regular Languages','Equivalence of Finite Automata','Minimization of Finite Automata']},
    {name:'Context Free Languages',topics:['Context-Free Grammar','Parse Trees','Ambiguity in Grammars','Ambiguity in Languages','Normal Forms of CFGs','Pumping Lemma for CFLs','Closure Properties of CFLs','Decision Properties of CFLs']},
    {name:'Push Down Automata',topics:['Push Down Automata','Language of a PDA','Equivalence of PDA and CFL','Deterministic PDA']},
    {name:'Turing Machines',topics:['Turing Machines','Language of a TM','Programming Techniques for TM','Extensions to TM','Restricted TM - Two-way Infinite Tape','Equivalence of One-Way and Two-Way Tape TMs','Multi-Tape TM','Non-deterministic TM']},
    {name:'Undecidability',topics:['Language Not Recursively Enumerable','Undecidable Problem that is RE','Undecidable Problems about TMs',"Post's Correspondence Problem",'Other Undecidable Problems']}
  ]},
  AIML:{label:'Artificial Intelligence and Machine Learning',units:[
    {name:'Foundations of AI & Intelligent Agents',topics:['Agents - Concept and PEAS','Types of Agents','Problem Formulation','State-Space Search','Uninformed Search Strategies','Informed Search - Heuristics','Informed Search - Greedy Best-First','Informed Search - A*','Adversarial Search - Minimax','Adversarial Search - Alpha-Beta Pruning','Constraint Satisfaction Problems','Cryptarithmetic']},
    {name:'Supervised Learning',topics:['Simple Linear Regression','Multiple Linear Regression','Regression Metrics - MAE, MSE, R\u00b2','Logistic Regression','Classification Metrics - Confusion Matrix','Precision, Recall, F1-Score, ROC/AUC','Naive Bayes','Decision Trees','K-Nearest Neighbours','Support Vector Machines']},
    {name:'Ensemble Techniques & Optimization',topics:['Ensemble Techniques','Random Forest','Gradient Boosting','Bias and Variance','Overfitting and Underfitting','K-Fold Cross Validation','Hyperparameter Tuning - GridSearchCV','Hyperparameter Tuning - RandomizedSearchCV']},
    {name:'Unsupervised Learning & Dimensionality Reduction',topics:['K-Means Clustering','Hierarchical Clustering','Association Rules - Apriori','Curse of Dimensionality','Principal Component Analysis (PCA)','Singular Value Decomposition (SVD)']},
    {name:'Neural Networks',topics:['Perceptron','Multilayer Perceptron','Activation Functions','Backpropagation','Deep Neural Networks','Hyperparameter Tuning for NNs','Batch Normalization','Softmax Regression','Optimizers - Adam','Optimizers - SGD','Regularization and Dropout']}
  ]},
  CN:{label:'Computer Networks',units:[
    {name:'Introduction and Physical Layer',topics:['Data Communication','Networks and Network Types','Protocol Layering','TCP/IP Protocol Suite','OSI Model','Physical Layer Performance','Transmission Media','Switching','Circuit-Switched Networks']},
    {name:'Data Link Layer and Media Access',topics:['Data Link Layer','Framing','Error Control','HDLC Protocol','PPP Protocol','Media Access Control','Ethernet Basics','CSMA/CD','Wireless LAN - 802.11']},
    {name:'Network Layer and Routing',topics:['Network Layer Services','Packet Switching','IPv4 Packet Format','IPv4 Address Spacing','Classful Addressing','Classless Addressing','Subnetting','IPv6','ARP','RARP','ICMP','Unicast Routing - Distance Vector/RIP','Unicast Routing - Link State/OSPF','Multicasting Basics']},
    {name:'Transport Layer',topics:['UDP','TCP - Connection Management','TCP - Flow Control','TCP - Congestion Control','TCP - Congestion Avoidance','SCTP']},
    {name:'Application Layer',topics:['Application Layer Paradigms','HTTP','FTP','SMTP','POP3','IMAP','MIME','DNS']}
  ]},
  PMOM:{label:'Project Management and Operations Management',units:[
    {name:'Fundamentals of Project Management',topics:['Understanding Project Management','Project Management Role','Classification of Projects','Product vs Project Management','Project Lifecycle','Project Risk Management','Case Study - LP Manning Corporation','Case Study - Project Firecracker']},
    {name:'Project Planning, Scheduling and Control',topics:['Project Planning Process','Work Breakdown Structure (WBS)','Gantt Chart','PERT','CPM','Resource Allocation','Project Budgeting and Cost Estimation','PMIS','MS Project','Primavera']},
    {name:'Software Project Management and Process Models',topics:['Waterfall Model','Prototyping Model','RAD Model','Incremental Model','Spiral Model','Agile Fundamentals','Scrum Framework']},
    {name:'Operations Management and Inventory Control',topics:['Production Systems and Classification','Operations Management - Definition','Operations Management - Objectives','Strategic Role of Operations','Strategic Planning','Inventory Control - Objectives','Inventory Control - Benefits','EOQ','JIT','ABC Analysis']},
    {name:'Quality Management and Sustainable Operations',topics:['Preventive Maintenance','Breakdown Maintenance','Techniques for Measuring Quality','Supply Chain Management','Lean Operations','Six Sigma Overview','TQM','ISO Standards','Indian Standards','Kaizen','5S']}
  ]},
  UHV:{label:'Universal Human Values and Service Learning',units:[
    {name:'Introduction - Basic Human Aspiration',topics:['Basic Human Aspirations','Fulfillment through Right Understanding','Right Understanding and Resolution','Activities of the Self','All-encompassing Resolution']},
    {name:'Right Understanding - Knower, Known & Process',topics:['Understanding the Human Being','Knower - Experiencer - Doer','Understanding Nature and Existence','Interconnectedness of Existence','Role of Human Beings in Existence']},
    {name:'Understanding Human Being',topics:['Co-existence of Self and Body','Activities of the Self','Potentialities of the Self','Basis for Harmony in the Self','Basis for Contradiction in the Self']},
    {name:'Understanding Nature and Existence',topics:['Comprehensive Understanding of Existence','Process of Inner Evolution','Self-exploration','Self-awareness','Self-evaluation','Realization, Understanding, and Contemplation']},
    {name:'Human Conduct, Resolution & Holistic Living',topics:['All-encompassing Resolution - Understanding','All-encompassing Resolution - Wisdom','All-encompassing Resolution - Science','Holistic Living - Realization','Holistic Living - Thought','Holistic Living - Behavior','Holistic Living - Work']}
  ]},
  QALR:{label:'Quantitative Aptitude and Logical Reasoning',units:[
    {name:'Quantitative Aptitude I',topics:['Averages - Properties','Weighted Averages','Averages of Averages','Percentage - Increase/Decrease','Successive Changes','Percentage Comparisons','Permutations','Combinations','Arrangements and Selections']},
    {name:'Quantitative Aptitude II',topics:['Problems on Ages - Single Variable','Problems on Ages - Multi Variable','Age Differences and Ratios','Ratios and Proportions','Comparing Ratios','Compound Ratios','Time and Work - Relationships','Work Rate and Efficiency','Combined Work and Wages']},
    {name:'Quantitative Aptitude III',topics:['Boats and Streams - Still Water Speed','Stream Speed','Upstream and Downstream','Pipes and Cisterns - Inlet/Outlet Rates','Combined Efficiency','Leakage Problems','Problems on Trains - Relative Speed','Crossing and Overtaking','Platform/Bridge Problems']},
    {name:'Logical Reasoning I',topics:['Alphabet Series','Number Series','Odd Man Out','Puzzles and Patterns','Blood Relations','Directional Sense','Venn Diagrams','Data Interpretation','Data Sufficiency']},
    {name:'Logical Reasoning II',topics:['Non-verbal Reasoning - Pattern Recognition','Analogy and Classification','Series Completion','Spatial Visualization','Cube and Dice','Mirror and Water Images','Syllogisms - Types','Venn Representation','Rules of Inference','Validity and Fallacies','Critical Thinking - Arguments','Logical Fallacies','Evidence and Counter-arguments']}
  ]},
  FL:{label:'Financial Literacy',units:[
    {name:'Introduction to Financial Literacy',topics:['Meaning and Need for Financial Literacy','Income, Expenses, Assets, Liabilities','Cash Flow','Financial Goals and Planning','Budgeting','Time Value of Money','Inflation']},
    {name:'Banking and Digital Financial Systems',topics:['Opening Bank Accounts','Types of Accounts','Cheques and DDs','ATM, Debit/Credit Cards','UPI','Internet and Mobile Banking','NEFT, RTGS, IMPS','Digital Payment Security','Cyber Safety','Role of RBI','Role of NPCI','Role of SEBI']},
    {name:'Saving and Investment Options',topics:['Saving vs Investment','Risk and Return','Bank Deposits','Mutual Funds','Stocks','Bonds','PPF','NPS','Insurance','Gold Bonds','Real Estate','Government Savings Schemes','Capital Markets','SIPs','Portfolio Diversification']},
    {name:'Credit, Loans and Taxation',topics:['Concept of Credit','Education Loans','Vehicle Loans','Home Loans','Personal Loans','Gold Loans','Credit Cards and Debt Management','Credit Score','Income Tax Structure','PAN','TDS','Filing IT Returns','Exemptions and Deductions']},
    {name:'Financial Planning, Entrepreneurship and Ethics',topics:['Components of Financial Planning','Retirement Planning','Insurance Planning','Financial Aspects of Entrepreneurship','Start-up Finance','Costing and Pricing','Break-even Analysis','Sustainable Financial Practices','Ethical Financial Behaviour']}
  ]},
  UIUX:{label:'UI and UX Design',units:[
    {name:'Foundations of Design',topics:['UI vs UX Design','Core Stages of Design Thinking','Divergent and Convergent Thinking','Brainstorming and Gamestorming','Observational Empathy']},
    {name:'Foundations of UI Design',topics:['Visual Principles','UI Principles','UI Elements and Patterns','Interaction Behaviours','Interaction Principles','Branding','Style Guides']},
    {name:'Foundations of UX Design',topics:['Introduction to User Experience','Why UX Matters','UX Design Process','UX Design Methodology','Research in UX Design','User Needs and Goals','Business Goals']},
    {name:'Wireframing, Prototyping and Testing',topics:['Sketching Principles','Sketching Red Routes','Responsive Design','Wireframing','Wireflows','Building a Prototype','High-Fidelity Mockups','Design Tools','Interaction Patterns','Usability Testing','Evaluative Research Methods','Synthesizing Test Findings','Prototype Iteration']},
    {name:'Research, Ideating & Information Architecture',topics:['Identifying Problem Statements','Writing Problem Statements','Appropriate Research Methods','Creating Personas','Solution Ideation','User Stories','Scenarios','Flow Diagrams','Flow Mapping','Information Architecture']}
  ]},
  POPL:{label:'Principles of Programming Languages',units:[
    {name:'Syntax and Semantics',topics:['Evolution of Programming Languages','Describing Syntax','Context-Free Grammars','Attribute Grammars','Describing Semantics','Lexical Analysis','Parsing','Recursive-Descent Parsing','Bottom-Up Parsing']},
    {name:'Data, Data Types, and Basic Statements',topics:['Names, Variables, Binding','Type Checking','Scope and Scope Rules','Lifetime and Garbage Collection','Primitive Data Types','Strings','Array Types','Associative Arrays','Record Types','Union Types','Pointers and References','Arithmetic Expressions','Overloaded Operators','Type Conversions','Relational and Boolean Expressions','Assignment Statements','Mixed-Mode Assignments','Control Structures - Selection','Control Structures - Iteration','Branching and Guarded Statements']},
    {name:'Subprograms and Implementations',topics:['Subprograms - Design Issues','Local Referencing','Parameter Passing','Overloaded Methods','Generic Methods','Semantics of Call and Return','Implementing Simple Subprograms','Stack and Dynamic Local Variables','Nested Subprograms','Blocks','Dynamic Scoping']},
    {name:'Object-Orientation, Concurrency, Event Handling',topics:['Object-Orientation Design Issues','OOP Language Design','Implementation of OOP Constructs','Concurrency - Semaphores','Concurrency - Monitors','Concurrency - Message Passing','Concurrency - Threads','Statement-Level Concurrency','Exception Handling','Event Handling']},
    {name:'Functional and Logic Programming',topics:['Introduction to Lambda Calculus','Fundamentals of Functional Programming','Programming with Scheme','Programming with ML','Introduction to Logic Programming','Programming with Prolog','Multi-paradigm Languages']}
  ]}
};

const COURSES=Object.keys(DATA);
const ROASTS={0:{t:'0%. ZERO. Not even started. A topper who skips studying is just a title with no content.',c:'rgba(255,68,68,0.1)',b:'rgba(255,68,68,0.3)',tx:'#ff6b6b'},10:{t:"10%? One topic and a nap. Your ego wrote a cheque your prep can't cash. Start.",c:'rgba(255,68,68,0.1)',b:'rgba(255,68,68,0.3)',tx:'#ff6b6b'},20:{t:"20%. The textbook is open. That's progress. But you're 80% away from done.",c:'rgba(255,149,0,0.1)',b:'rgba(255,149,0,0.3)',tx:'#ff9500'},30:{t:"30%. Some momentum. Still in the danger zone. The exam date doesn't care about your excuses.",c:'rgba(255,149,0,0.1)',b:'rgba(255,149,0,0.3)',tx:'#ff9500'},40:{t:"40%. Almost half. Almost isn't a grade. Push through.",c:'rgba(255,149,0,0.1)',b:'rgba(255,149,0,0.3)',tx:'#ff9500'},50:{t:'50%. Exactly halfway. The second half is what separates toppers from the rest. Choose.',c:'rgba(255,149,0,0.1)',b:'rgba(255,149,0,0.3)',tx:'#ff9500'},60:{t:"60%. The ego has receipts now. Don't let up.",c:'rgba(200,255,0,0.08)',b:'rgba(200,255,0,0.25)',tx:'#c8ff00'},70:{t:'70%. Solid. The lazy version of you is losing. Good. Keep going.',c:'rgba(200,255,0,0.08)',b:'rgba(200,255,0,0.25)',tx:'#c8ff00'},80:{t:'80%. Top tier territory. This is what doing the work actually looks like.',c:'rgba(68,204,68,0.1)',b:'rgba(68,204,68,0.3)',tx:'#44cc44'},90:{t:"90%! Almost a complete sweep. That last 10% is your signature. Don't leave it blank.",c:'rgba(68,204,68,0.1)',b:'rgba(68,204,68,0.3)',tx:'#44cc44'},100:{t:'100%. FULL UNIT CLEARED. Certified. Now do this for every single unit.',c:'rgba(68,204,68,0.15)',b:'rgba(68,204,68,0.4)',tx:'#44cc44'}};

function initState(){const saved=localStorage.getItem('sem5_ego_v1');if(saved){try{return JSON.parse(saved);}catch(e){}}const s={};COURSES.forEach(c=>{s[c]=DATA[c].units.map(u=>({name:u.name,subtopics:u.topics.map(t=>({name:t,status:0}))}));});return s;}
let state=initState(),aC='TOC',aU=0,chartInst=null;
function save(){try{localStorage.setItem('sem5_ego_v1',JSON.stringify(state));}catch(e){}}
const stScore=s=>s.status===2?100:s.status===1?50:0;
const unitScore=(c,u)=>{const s=state[c][u].subtopics;return s.length?Math.round(s.reduce((a,t)=>a+stScore(t),0)/s.length):0;};
const courseScore=c=>Math.round(state[c].reduce((a,_,i)=>a+unitScore(c,i),0)/state[c].length);
const overallScore=()=>Math.round(COURSES.reduce((a,c)=>a+courseScore(c),0)/COURSES.length);
const totalDone=()=>COURSES.reduce((a,c)=>a+state[c].reduce((b,u)=>b+u.subtopics.filter(s=>s.status===2).length,0),0);
const totalSTs=()=>COURSES.reduce((a,c)=>a+state[c].reduce((b,u)=>b+u.subtopics.length,0),0);
const pipCol=sc=>sc===0?'#ff4444':sc<60?'#ff9500':'#44cc44';
const scoreCol=sc=>sc<40?'#ff4444':sc<70?'#ff9500':'#44cc44';
function render(){renderMetrics();renderCTabs();renderUTabs();renderPanel();renderChart();renderRoast();}
function renderMetrics(){const ov=overallScore(),td=totalDone(),ts=totalSTs();document.getElementById('overall-pct').textContent=ov+'%';document.getElementById('metrics').innerHTML='<div class="mc"><div class="mv" style="color:'+scoreCol(ov)+'">'+ov+'%</div><div class="ml">Overall</div></div><div class="mc"><div class="mv" style="color:#44cc44">'+td+'</div><div class="ml">Done</div></div><div class="mc"><div class="mv" style="color:#888">'+(ts-td)+'</div><div class="ml">Remaining</div></div>';}
function renderCTabs(){document.getElementById('ctabs').innerHTML=COURSES.map(c=>'<button class="ctab '+(c===aC?'active':'')+'" onclick="swC(\''+c+'\')">'+c+' <span style="opacity:0.7;font-size:10px">'+courseScore(c)+'%</span></button>').join('');}
function renderUTabs(){document.getElementById('utabs').innerHTML=state[aC].map((_,i)=>{const sc=unitScore(aC,i);return'<button class="utab '+(i===aU?'active':'')+'" onclick="swU('+i+')">U'+(i+1)+'<span class="pip" style="background:'+pipCol(sc)+'"></span></button>';}).join('');document.getElementById('cinfo').textContent=DATA[aC].label;}
function renderPanel(){const unit=state[aC][aU],sc=unitScore(aC,aU);document.getElementById('ptitle').textContent='U'+(aU+1)+' \u2014 '+unit.name;const b=document.getElementById('uscore');b.textContent=sc+'%';b.style.color=scoreCol(sc);const f=document.getElementById('pfill');f.style.width=sc+'%';f.style.background=scoreCol(sc);document.getElementById('stlist').innerHTML=unit.subtopics.map((s,i)=>{const cls=['sn','sp','sd'][s.status];const rowCls=s.status===2?'done-row':s.status===1?'prog-row':'';const lbl=['NOT STARTED','IN PROGRESS','DONE'][s.status];return'<div class="strow '+rowCls+'"><span class="stnum">'+String(i+1).padStart(2,'0')+'</span><span class="stname">'+s.name+'</span><button class="stbtn '+cls+'" onclick="cycleST('+i+')">'+lbl+'</button></div>';}).join('');}
function renderChart(){document.getElementById('clbl').textContent=aC+' \u2014 UNIT PROGRESS';const labels=state[aC].map((_,i)=>'U'+(i+1));const done=state[aC].map((_,i)=>{const s=state[aC][i].subtopics;return s.length?Math.round(s.filter(t=>t.status===2).length/s.length*100):0;});const part=state[aC].map((_,i)=>{const s=state[aC][i].subtopics;return s.length?Math.round(s.filter(t=>t.status===1).length/s.length*100):0;});const none=state[aC].map((_,i)=>{const s=state[aC][i].subtopics;return s.length?Math.round(s.filter(t=>t.status===0).length/s.length*100):0;});if(chartInst)chartInst.destroy();chartInst=new Chart(document.getElementById('ch'),{type:'bar',data:{labels:labels,datasets:[{label:'Done',data:done,backgroundColor:'#44cc44',borderRadius:4,stack:'s'},{label:'In progress',data:part,backgroundColor:'#ff9500',borderRadius:0,stack:'s'},{label:'Not started',data:none,backgroundColor:'#ff4444',borderRadius:0,stack:'s'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+ctx.raw+'%';}},backgroundColor:'#1f1f1f',borderColor:'#383838',borderWidth:1,titleColor:'#f0f0f0',bodyColor:'#888'}},scales:{x:{stacked:true,ticks:{font:{size:11,family:'Space Mono'},color:'#555'},grid:{display:false},border:{color:'#2a2a2a'}},y:{stacked:true,min:0,max:100,ticks:{callback:function(v){return v+'%';},font:{size:10,family:'Space Mono'},color:'#555'},grid:{color:'#1f1f1f'},border:{color:'#2a2a2a'}}}}});}
function renderRoast(){const sc=unitScore(aC,aU);const r=ROASTS[Math.min(Math.floor(sc/10)*10,100)];const el=document.getElementById('roast');el.style.background=r.c;el.style.borderColor=r.b;el.style.color=r.tx;el.textContent=r.t;}
function cycleST(i){state[aC][aU].subtopics[i].status=(state[aC][aU].subtopics[i].status+1)%3;save();render();}
function addST(){const v=document.getElementById('newst').value.trim();if(!v)return;state[aC][aU].subtopics.push({name:v,status:0});document.getElementById('newst').value='';save();render();}
document.getElementById('newst').addEventListener('keydown',function(e){if(e.key==='Enter')addST();});
function swC(c){aC=c;aU=0;render();}
function swU(u){aU=u;render();}
render();
</script>
</body>
</html>
